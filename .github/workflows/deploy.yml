name: Stage 3 Docker CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-code:
    name: Run Unit Tests (CI)
    runs-on: self-hosted
    steps:
      - name: Test Inside Container
        run: |
          cd ~/repos/ops-service-v1
          # Build a temporary image to test against
          docker build -t test-image .
          # Run pytest inside the isolated container, then delete the container (--rm)
          docker run --rm test-image python -m pytest tests/

  deploy-to-server:
    name: Deploy to Production (CD)
    needs: test-code
    runs-on: self-hosted
    steps:
      - name: Execute Docker Compose
        run: |
          cd ~/repos/ops-service-v1
          git pull origin main
          # The single command that replaces venv, pip install, and systemctl
          docker compose up -d --build
          # Clean up old unused, dangling images to save disk space
          docker image prune -f
