name: Stage 2 CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-code:
    name: Run Unit Tests (CI)
    runs-on: self-hosted
    steps:
      - name: Run Pytest
        run: |
          cd ~/repos/ops-service-v1
          source venv/bin/activate
          python -m pytest tests/

  deploy-to-server:
    name: Deploy to Production (CD)
    needs: test-code  # <--- THIS IS THE MAGIC! It waits for the tests to pass!
    runs-on: self-hosted
    steps:
      - name: Execute Deployment Commands
        run: |
          cd ~/repos/ops-service-v1
          git pull origin main
          source venv/bin/activate
          pip install -r requirements.txt
          sudo systemctl restart ops-service-v1
